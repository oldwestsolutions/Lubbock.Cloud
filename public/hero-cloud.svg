<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1280" viewBox="0 0 1600 1280" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="heroSky" x1="800" y1="0" x2="800" y2="1280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8a9299"/>
      <stop offset="35%" stop-color="#4a5058"/>
      <stop offset="70%" stop-color="#1c1e22"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="200" y1="100" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="45%" stop-color="#c6c6c6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="heroSun" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 220) rotate(90) scale(420)">
      <stop stop-color="#e8e8e8" stop-opacity="0.35"/>
      <stop offset="0.45" stop-color="#a8adb4" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <filter id="heroBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="heroBlurSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1600" height="1280" fill="url(#heroSky)"/>
  <rect width="1600" height="1280" fill="url(#heroGlow)"/>
  <rect width="1600" height="1280" fill="url(#heroSun)"/>
  <!-- Layered cloud masses -->
  <g filter="url(#heroBlur)" opacity="0.85">
    <ellipse cx="380" cy="520" rx="340" ry="110" fill="#d8d8d8" fill-opacity="0.22"/>
    <ellipse cx="520" cy="500" rx="280" ry="95" fill="#ececec" fill-opacity="0.18"/>
    <ellipse cx="900" cy="580" rx="420" ry="130" fill="#c0c4ca" fill-opacity="0.2"/>
    <ellipse cx="1120" cy="540" rx="360" ry="100" fill="#e2e2e2" fill-opacity="0.16"/>
  </g>
  <g filter="url(#heroBlurSoft)" opacity="0.9">
    <ellipse cx="200" cy="720" rx="260" ry="80" fill="#b8bcc2" fill-opacity="0.25"/>
    <ellipse cx="480" cy="700" rx="320" ry="88" fill="#d4d6da" fill-opacity="0.2"/>
    <ellipse cx="780" cy="760" rx="400" ry="100" fill="#9ea3aa" fill-opacity="0.22"/>
    <ellipse cx="1180" cy="700" rx="340" ry="92" fill="#cfd2d6" fill-opacity="0.2"/>
    <ellipse cx="1450" cy="780" rx="280" ry="78" fill="#aeb3ba" fill-opacity="0.18"/>
  </g>
  <g opacity="0.55">
    <ellipse cx="640" cy="360" rx="200" ry="56" fill="#ffffff" fill-opacity="0.12"/>
    <ellipse cx="820" cy="340" rx="240" ry="62" fill="#ffffff" fill-opacity="0.1"/>
  </g>
</svg>
